<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - Stack 'Em Up!</title>
    <link rel="stylesheet" href="tetris.css">
</head>
<body class="landing-page">
    <div class="landing-container">
        <div class="hero-section">
            <div class="tetris-dog">
                <div class="dog-head">
                    <div class="dog-ear left"></div>
                    <div class="dog-ear right"></div>
                    <div class="dog-face">
                        <div class="dog-eyes">
                            <div class="eye left"></div>
                            <div class="eye right"></div>
                        </div>
                        <div class="dog-nose"></div>
                        <div class="dog-mouth"></div>
                    </div>
                </div>
                <div class="dog-body"></div>
                <div class="tetris-block block1"></div>
                <div class="tetris-block block2"></div>
                <div class="tetris-block block3"></div>
            </div>
            
            <h1 class="game-title">
                <span class="letter" style="animation-delay: 0s">T</span>
                <span class="letter" style="animation-delay: 0.1s">E</span>
                <span class="letter" style="animation-delay: 0.2s">T</span>
                <span class="letter" style="animation-delay: 0.3s">R</span>
                <span class="letter" style="animation-delay: 0.4s">I</span>
                <span class="letter" style="animation-delay: 0.5s">S</span>
            </h1>
            
            <p class="tagline">Stack blocks, clear lines, beat your high score!</p>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">🎮</div>
                    <p>Classic Gameplay</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <p>Fast & Smooth</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">🏆</div>
                    <p>Score Tracking</p>
                </div>
            </div>
            
            <a href="game.html" class="play-button">
                <span class="button-text">PLAY NOW</span>
                <span class="button-icon">▶</span>
            </a>
            
            <p class="hint">Use arrow keys to play • Space to rotate</p>
        </div>
    </div>
</body>
</html>
